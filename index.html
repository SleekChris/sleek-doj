<!DOCTYPE html>
<html>
<head>
  <title>Sleek DOJ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f0f14;
      color: white;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #18181f;
      padding: 20px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 30px;
      color: white;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav button {
      background: none;
      border: none;
      color: #a1a1aa;
      padding: 10px;
      text-align: left;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav button:hover,
    .nav button.active {
      background: #23232b;
      color: white;
    }

    .main {
      flex: 1;
      padding: 40px;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .header {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .card {
      background: #18181f;
      padding: 25px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .create-btn {
  background: #23232b;
  color: white;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 16px;
}
.create-btn:hover {
  background: #2b2b35;
}
.case-item {
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.case-input {
  width: 100%;
  box-sizing: border-box;
  background: #111118;
  color: white;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
  font-family: 'Inter', sans-serif;
}

.case-textarea {
  min-height: 100px;
  resize: vertical;
}
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">Sleek's DOJ Database</div>

    <div class="nav">
      <button onclick="showPage('dashboard', this)" class="active">Dashboard</button>
      <button onclick="showPage('cases', this)">Cases</button>
      <button onclick="showPage('mycases', this)">My Cases</button>
      <button onclick="showPage('search', this)">Search</button>
      <button onclick="showPage('admin', this)">Admin</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div id="dashboard" class="page active">
      <div class="header">Dashboard</div>
      <div class="card">Welcome to your DOJ system.</div>
    </div>

    <div id="cases" class="page">
  <div class="header">Cases</div>

  <div style="display: flex; gap: 20px;">

    <!-- LEFT: Case List -->
    <div style="width: 300px;">
      <div class="card" style="margin-bottom: 20px;">
        <h3 style="margin-top: 0;">Create Case</h3>

        <input id="caseDate" placeholder="Date" class="case-input">
        <input id="caseTitle" placeholder="Title" class="case-input">
        <input id="caseDefendant" placeholder="Defendant Name" class="case-input">
        <input id="caseCharges" placeholder="Charges" class="case-input">
        <textarea id="caseInfo" placeholder="Additional Info" class="case-input case-textarea"></textarea>

        <button class="create-btn" onclick="createCase()">+ Create</button>
      </div>

      <div class="card" id="caseList">No cases yet.</div>
    </div>

    <!-- RIGHT: Case Viewer -->
    <div style="flex: 1;">
      <div class="card" id="caseViewer">
        Select a case to view details.
      </div>
    </div>

  </div>
</div>

    <div id="mycases" class="page">
      <div class="header">My Cases</div>
      <div class="card">Your assigned cases will appear here.</div>
    </div>

    <div id="search" class="page">
      <div class="header">Search</div>
      <div class="card">Search system coming next.</div>
    </div>

    <div id="admin" class="page">
      <div class="header">Admin Panel</div>
      <div class="card">Admin tools coming next.</div>
    </div>

  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = 'https://gzpejcraxocnbfnwxfzs.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6cGVqY3JheG9jbmJmbnd4ZnpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMzE2NzMsImV4cCI6MjA4OTcwNzY3M30.fuVnujsaVWc1IbapfbAZe9gwggrfI3jBpJMnR1VX0GA';

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let cases = [];
  let selectedCaseId = null;

  function showPage(pageId, button) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');

    document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
    button.classList.add('active');
  }

  function escapeHtml(text) {
    return String(text ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  async function loadCases() {
    const caseList = document.getElementById('caseList');
    const caseViewer = document.getElementById('caseViewer');

    caseList.innerHTML = 'Loading cases...';

    const { data, error } = await supabaseClient
      .from('cases')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      console.error('Error loading cases:', error);
      caseList.innerHTML = 'Failed to load cases.';
      caseViewer.innerHTML = 'Check your Supabase setup.';
      return;
    }

    cases = data || [];
    renderCases();

    if (selectedCaseId) {
      const existingCase = cases.find(c => c.id === selectedCaseId);
      if (existingCase) {
        openCase(selectedCaseId);
        return;
      }
    }

    if (cases.length > 0) {
      openCase(cases[0].id);
    } else {
      caseViewer.innerHTML = 'Select a case to view details.';
    }
  }

  async function createCase() {
    const date = document.getElementById('caseDate').value.trim();
    const title = document.getElementById('caseTitle').value.trim();
    const defendant = document.getElementById('caseDefendant').value.trim();
    const charges = document.getElementById('caseCharges').value.trim();
    const info = document.getElementById('caseInfo').value.trim();

    if (!date || !title || !defendant) {
      alert('Date, Title, and Defendant required.');
      return;
    }

    const { data, error } = await supabaseClient
      .from('cases')
      .insert([
        {
          date,
          title,
          defendant,
          charges,
          info,
          status: 'Open'
        }
      ])
      .select();

    if (error) {
      console.error('Error creating case:', error);
      alert('Failed to create case.');
      return;
    }

    document.getElementById('caseDate').value = '';
    document.getElementById('caseTitle').value = '';
    document.getElementById('caseDefendant').value = '';
    document.getElementById('caseCharges').value = '';
    document.getElementById('caseInfo').value = '';

    await loadCases();

    if (data && data[0]) {
      openCase(data[0].id);
    }
  }

  function renderCases() {
    const caseList = document.getElementById('caseList');
    caseList.innerHTML = '';

    if (cases.length === 0) {
      caseList.innerHTML = 'No cases yet.';
      return;
    }

    cases.forEach(c => {
      const activeStyle = c.id === selectedCaseId
        ? 'background:#23232b; border-radius:10px;'
        : '';

      caseList.innerHTML += `
        <div class="case-item" onclick="openCase('${c.id}')" style="cursor:pointer; ${activeStyle}">
          <strong>${escapeHtml(c.title)}</strong><br>
          <span style="color:#a1a1aa; font-size:12px;">${escapeHtml(c.defendant)}</span><br>
          <span style="color:#71717a; font-size:11px;">${escapeHtml(c.status || 'Open')}</span>
        </div>
      `;
    });
  }

  function openCase(id) {
    selectedCaseId = id;
    const c = cases.find(x => x.id === id);

    renderCases();

    if (!c) {
      document.getElementById('caseViewer').innerHTML = 'Case not found.';
      return;
    }

    document.getElementById('caseViewer').innerHTML = `
      <div style="margin-bottom:20px;">
        <h2 style="margin:0;">Edit Case</h2>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
        <div>
          <label style="display:block; margin-bottom:6px; color:#a1a1aa;">Date</label>
          <input
            class="case-input"
            value="${escapeHtml(c.date)}"
            oninput="updateCaseField('${c.id}', 'date', this.value)"
          >
        </div>

        <div>
          <label style="display:block; margin-bottom:6px; color:#a1a1aa;">Title</label>
          <input
            class="case-input"
            value="${escapeHtml(c.title)}"
            oninput="updateCaseField('${c.id}', 'title', this.value)"
          >
        </div>

        <div>
          <label style="display:block; margin-bottom:6px; color:#a1a1aa;">Defendant</label>
          <input
            class="case-input"
            value="${escapeHtml(c.defendant)}"
            oninput="updateCaseField('${c.id}', 'defendant', this.value)"
          >
        </div>

        <div>
          <label style="display:block; margin-bottom:6px; color:#a1a1aa;">Charges</label>
          <input
            class="case-input"
            value="${escapeHtml(c.charges || '')}"
            oninput="updateCaseField('${c.id}', 'charges', this.value)"
          >
        </div>

        <div style="grid-column:1 / span 2;">
          <label style="display:block; margin-bottom:6px; color:#a1a1aa;">Status</label>
          <select
            class="case-input"
            onchange="updateCaseField('${c.id}', 'status', this.value)"
          >
            <option value="Open" ${c.status === 'Open' ? 'selected' : ''}>Open</option>
            <option value="Pending" ${c.status === 'Pending' ? 'selected' : ''}>Pending</option>
            <option value="Closed" ${c.status === 'Closed' ? 'selected' : ''}>Closed</option>
          </select>
        </div>
      </div>

      <div class="card" style="padding:18px;">
        <strong style="display:block; margin-bottom:10px;">Additional Info / Notes</strong>
        <textarea
          class="case-input case-textarea"
          style="min-height:160px; margin-bottom:12px;"
          oninput="updateCaseField('${c.id}', 'info', this.value)"
        >${escapeHtml(c.info || '')}</textarea>

        <button class="create-btn" onclick="deleteCase('${c.id}')">Delete Case</button>
      </div>
    `;
  }

  let typingTimeout;

async function updateCaseField(id, field, value) {
  const localCase = cases.find(x => x.id === id);
  if (!localCase) return;

  // update instantly locally
  localCase[field] = value;
  renderCases();

  // debounce so we don’t spam database
  clearTimeout(typingTimeout);

  typingTimeout = setTimeout(async () => {
    const updates = {};
    updates[field] = value;

    const { error } = await supabaseClient
      .from('cases')
      .update(updates)
      .eq('id', id);

    if (error) {
      console.error('Update error:', error);
    }
  }, 200); // sends update after user pauses typing
} {
    const localCase = cases.find(x => x.id === id);
    if (!localCase) return;

    localCase[field] = value;
    renderCases();

    const updates = {};
    updates[field] = value;

    const { error } = await supabaseClient
      .from('cases')
      .update(updates)
      .eq('id', id);

    if (error) {
      console.error('Error updating case:', error);
    }
  }

  async function deleteCase(id) {
    const confirmed = confirm('Delete this case?');
    if (!confirmed) return;

    const { error } = await supabaseClient
      .from('cases')
      .delete()
      .eq('id', id);

    if (error) {
      console.error('Error deleting case:', error);
      alert('Failed to delete case.');
      return;
    }

    selectedCaseId = null;
    await loadCases();
  }

  loadCases();

// REALTIME LISTENER (ADD THIS)
supabaseClient
  .channel('cases-realtime')
  .on(
    'postgres_changes',
    {
      event: '*',
      schema: 'public',
      table: 'cases'
    },
    () => {
      loadCases();
    }
  )
  .subscribe();
</script>

</body>
</html>
