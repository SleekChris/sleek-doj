<!DOCTYPE html>
<html>
<head>
  <title>Sleek DOJ</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { background:#111; color:white; font-family:Arial; }
    .nav-btn { display:block; margin:5px; cursor:pointer; }
    .page { display:none; }
    .active { display:block; }
  </style>
</head>

<body>

<!-- NAV -->
<button class="nav-btn" onclick="showPage('dashboard', this)">Dashboard</button>
<button class="nav-btn" onclick="showPage('cases', this)">Cases</button>

<!-- PAGES -->
<div id="dashboard" class="page active">
  <h1>Dashboard</h1>
</div>

<div id="cases" class="page">
  <h1>Cases</h1>

  <input id="caseDate" placeholder="Date">
  <input id="caseTitle" placeholder="Title">
  <input id="caseDefendant" placeholder="Defendant">
  <input id="caseCharges" placeholder="Charges">
  <textarea id="caseInfo" placeholder="Notes"></textarea>

  <button onclick="createCase()">Create Case</button>

  <div id="caseList"></div>
  <div id="caseViewer"></div>
</div>

<script>
const SUPABASE_URL = 'https://gzpejcraxocnbfnwxfzs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6cGVqY3JheG9jbmJmbnd4ZnpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMzE2NzMsImV4cCI6MjA4OTcwNzY3M30.fuVnujsaVWc1IbapfbAZe9gwggrfI3jBpJMnR1VX0GAPASTE_YOUR_ANON_KEY_HERE';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let cases = [];
let selectedCaseId = null;
let typingTimeout;

function showPage(pageId, button) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');

  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  button.classList.add('active');
}

function escapeHtml(text) {
  return String(text ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;');
}

async function loadCases() {
  const { data } = await supabaseClient
    .from('cases')
    .select('*')
    .order('created_at',{ascending:false});

  cases = data || [];
  renderCases();
}

async function createCase() {
  const date = caseDate.value;
  const title = caseTitle.value;
  const defendant = caseDefendant.value;
  const charges = caseCharges.value;
  const info = caseInfo.value;

  await supabaseClient.from('cases').insert([
    { date, title, defendant, charges, info, status:'Open' }
  ]);

  loadCases();
}

function renderCases() {
  caseList.innerHTML = '';

  cases.forEach(c=>{
    caseList.innerHTML += `
      <div onclick="openCase('${c.id}')">
        ${escapeHtml(c.title)}
      </div>
    `;
  });
}

function openCase(id){
  selectedCaseId = id;
  const c = cases.find(x=>x.id===id);

  caseViewer.innerHTML = `
    <input value="${c.title}" oninput="updateField('${id}','title',this.value)">
    <textarea oninput="updateField('${id}','info',this.value)">${c.info||''}</textarea>
  `;
}

function updateField(id,field,value){
  clearTimeout(typingTimeout);

  typingTimeout = setTimeout(()=>{
    supabaseClient
      .from('cases')
      .update({[field]:value})
      .eq('id',id);
  },200);
}

loadCases();

// REALTIME
supabaseClient
  .channel('cases')
  .on('postgres_changes',{
    event:'*',
    schema:'public',
    table:'cases'
  },()=>{
    loadCases();
  })
  .subscribe();
</script>

</body>
</html>
