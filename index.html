<!DOCTYPE html>
<html>
<head>
  <title>Sleek DOJ</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0f;
      color: white;
    }

    .sidebar {
      width: 200px;
      height: 100vh;
      background: #111;
      position: fixed;
      padding: 20px;
    }

    .nav-btn {
      display: block;
      margin: 10px 0;
      padding: 10px;
      background: #1a1a22;
      border: none;
      color: white;
      cursor: pointer;
    }

    .nav-btn.active {
      background: #2a2a35;
    }

    .content {
      margin-left: 220px;
      padding: 20px;
    }

    .page { display: none; }
    .page.active { display: block; }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      background: #111;
      border: 1px solid #333;
      color: white;
    }

    button {
      padding: 10px;
      background: #2a2a35;
      border: none;
      color: white;
      cursor: pointer;
    }

    .case-item {
      background: #1a1a22;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <button class="nav-btn active" onclick="showPage('dashboard', this)">Dashboard</button>
  <button class="nav-btn" onclick="showPage('cases', this)">Cases</button>
</div>

<div class="content">

  <div id="dashboard" class="page active">
    <h1>Dashboard</h1>
  </div>

  <div id="cases" class="page">
    <h1>Cases</h1>

    <input id="caseDate" placeholder="Date">
    <input id="caseTitle" placeholder="Title">
    <input id="caseDefendant" placeholder="Defendant">
    <input id="caseCharges" placeholder="Charges">
    <textarea id="caseInfo" placeholder="Notes"></textarea>

    <button onclick="createCase()">Create Case</button>

    <h3>Case List</h3>
    <div id="caseList"></div>

    <h3>Edit Case</h3>
    <div id="caseViewer"></div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://gzpejcraxocnbfnwxfzs.supabase.co';
const SUPABASE_ANON_KEY = 'PASTE_YOUR_ANON_KEY_HERE';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let cases = [];
let selectedCaseId = null;
let typingTimeout;

function showPage(pageId, button) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');

  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  button.classList.add('active');
}

async function loadCases() {
  const { data } = await supabaseClient
    .from('cases')
    .select('*')
    .order('created_at', { ascending: false });

  cases = data || [];
  renderCases();
}

async function createCase() {
  const date = caseDate.value;
  const title = caseTitle.value;
  const defendant = caseDefendant.value;
  const charges = caseCharges.value;
  const info = caseInfo.value;

  await supabaseClient.from('cases').insert([
    { date, title, defendant, charges, info, status: 'Open' }
  ]);

  loadCases();
}

function renderCases() {
  caseList.innerHTML = '';

  cases.forEach(c => {
    caseList.innerHTML += `
      <div class="case-item" onclick="openCase('${c.id}')">
        <strong>${c.title}</strong><br>
        <small>${c.defendant}</small>
      </div>
    `;
  });
}

function openCase(id) {
  selectedCaseId = id;
  const c = cases.find(x => x.id === id);

  caseViewer.innerHTML = `
    <input value="${c.title}" oninput="updateField('${id}','title',this.value)">
    <input value="${c.defendant}" oninput="updateField('${id}','defendant',this.value)">
    <textarea oninput="updateField('${id}','info',this.value)">${c.info || ''}</textarea>
  `;
}

function updateField(id, field, value) {
  clearTimeout(typingTimeout);

  typingTimeout = setTimeout(() => {
    supabaseClient
      .from('cases')
      .update({ [field]: value })
      .eq('id', id);
  }, 200);
}

loadCases();

// REALTIME
supabaseClient
  .channel('cases')
  .on('postgres_changes', {
    event: '*',
    schema: 'public',
    table: 'cases'
  }, () => {
    loadCases();
  })
  .subscribe();
</script>

</body>
</html>
